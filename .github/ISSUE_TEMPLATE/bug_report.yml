name: Bug Report
description: Report a bug in an n8n-ai-agent-delegator workflow
title: "[Bug]: "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: input
    id: workflow
    attributes:
      label: Workflow file
      description: Which workflow JSON file is affected?
      placeholder: e.g., workflows/0000-orchestrator.json
    validations:
      required: true

  - type: input
    id: n8n-version
    attributes:
      label: n8n version
      description: What version of n8n are you running?
      placeholder: e.g., 1.30.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the behavior.
      value: |
        1. Import workflow '...'
        2. Configure credentials for '...'
        3. Execute with input '...'
        4. See error at node '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages if applicable.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context — screenshots, logs, environment details.
    validations:
      required: false
